name: VİTOS Pipeline - Headless Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: self-hosted

    steps:

      - name: Repo'yu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pipeline'ı çalıştır
        shell: pwsh
        env:
          HEADLESS: "1"
          SCOPE: "video+audio"
          FIRST_MIN: "1.0"
          LAST_MIN: "1.0"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          # Audio bridge env variable'ları
          $repoRoot = "F:\REPO_GitHub\Cagatay_22.02\Project"
          $env:AUDIO_WORKER_SCRIPT = Join-Path $repoRoot "core\audio_worker.py"
          $env:VENV_AUDIO_PYTHON   = "F:\Root\venv_audio\Scripts\python.exe"

          # Ana venv'i aktive et
          . "F:\Root\venv\Scripts\Activate.ps1"

          # Proje klasörüne gir ve çalıştır
          Set-Location "F:\REPO_GitHub\Cagatay_22.02\Project"
          python main.py D:\test.mp4

      - name: Çıktıları commit et ve push et
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Safe directory iznini ver
          git config --global --add safe.directory F:/REPO_GitHub/Cagatay_22.02

          Set-Location "F:\REPO_GitHub\Cagatay_22.02"
          git config user.name "vitos-runner"
          git config user.email "vitos@runner.local"
          git add test/
          $diff = git status --porcelain
          if ($diff) {
            git commit -m "test/ output guncellendi [skip ci]"
            git push
          } else {
            Write-Host "Yeni cikti yok, commit atlandi."
          }
