name: VİTOS Pipeline - Headless Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: self-hosted

    steps:

      - name: Repo'yu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Pipeline'ı çalıştır
        shell: pwsh
        env:
          HEADLESS: "1"
          SCOPE: "video+audio"
          FIRST_MIN: "1.0"
          LAST_MIN: "1.0"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          $repoRoot = "F:\REPO_GitHub\Cagatay_22.02\Project"
          $env:AUDIO_WORKER_SCRIPT = Join-Path $repoRoot "core\audio_worker.py"
          $env:VENV_AUDIO_PYTHON   = "F:\Root\venv_audio\Scripts\python.exe"

          . "F:\Root\venv\Scripts\Activate.ps1"

          Set-Location "F:\REPO_GitHub\Cagatay_22.02\Project"
          python main.py D:\test.mp4

      - name: Kullanıcı raporunu F:\Sonuclar'a kopyala
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # En son oluşturulan klasörü bul (D:\DATABASE\FilmDizi altında)
          $latest = Get-ChildItem "D:\DATABASE\FilmDizi" -Directory | 
                    Sort-Object LastWriteTime -Descending | 
                    Select-Object -First 1

          if (-not $latest) { throw "D:\DATABASE\FilmDizi altında klasör bulunamadı" }

          # Kullanıcı raporunu bul (.txt uzantılı, _teknik içermeyen)
          $rapor = Get-ChildItem $latest.FullName -Filter "*.txt" | 
                   Where-Object { $_.Name -notlike "*teknik*" -and $_.Name -notlike "*tscr*" } |
                   Select-Object -First 1

          if (-not $rapor) { throw "Kullanıcı raporu bulunamadı: $($latest.FullName)" }

          # F:\Sonuclar klasörünü oluştur (yoksa)
          New-Item -ItemType Directory -Force "F:\Sonuclar" | Out-Null

          # Kopyala
          Copy-Item $rapor.FullName "F:\Sonuclar\$($rapor.Name)" -Force
          Write-Host "Rapor kopyalandı: F:\Sonuclar\$($rapor.Name)"

          # GitHub test/ klasörüne de kopyala
          New-Item -ItemType Directory -Force "F:\REPO_GitHub\Cagatay_22.02\test" | Out-Null
          Copy-Item $rapor.FullName "F:\REPO_GitHub\Cagatay_22.02\test\$($rapor.Name)" -Force
          Write-Host "GitHub test/ klasörüne kopyalandı"

      - name: GitHub'a push et
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          git config --global --add safe.directory F:/REPO_GitHub/Cagatay_22.02
          Set-Location "F:\REPO_GitHub\Cagatay_22.02"
          git config user.name "vitos-runner"
          git config user.email "vitos@runner.local"
          git add test/
          $diff = git status --porcelain
          if ($diff) {
            git commit -m "test/ kullanici raporu guncellendi [skip ci]"
            git push
          } else {
            Write-Host "Yeni rapor yok, commit atlandi."
          }
